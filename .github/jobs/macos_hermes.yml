parameters:
- name: name
  type: string

jobs:
- job: ${{parameters.name}}
  timeoutInMinutes: 30

  pool:
    vmImage: macOS-latest

  steps:
  - script: |
      sudo xcode-select --switch /Applications/Xcode_16.4.app/Contents/Developer
    displayName: 'Select Xcode 16.4'

  - script: |
      cmake -B Build/macOS -G Xcode -D NAPI_JAVASCRIPT_ENGINE=Hermes
    displayName: 'Configure CMake'

  - task: Xcode@5
    inputs:
      xcWorkspacePath: 'Build/macOS/JsRuntimeHost.xcodeproj'
      scheme: 'UnitTests'
      sdk: 'macosx'
      useXcpretty: false
      configuration: RelWithDebInfo
    displayName: 'Build Xcode Project'

  - script: ./UnitTests
    workingDirectory: 'Build/macOS/Tests/UnitTests/RelWithDebInfo'
    displayName: 'Run Tests'
