parameters:
  name: ''
  enableSanitizers: false
  enableThreadSanitizer: false
  CC: gcc
  CXX: g++

jobs:
- job: ${{parameters.name}}
  timeoutInMinutes: 15

  pool:
    vmImage: ubuntu-latest

  variables:
    SANITIZER_FLAG: ${{coalesce(replace(format('{0}', parameters.enableSanitizers), 'True', 'ON'), 'OFF')}}
    THREAD_SANITIZER_FLAG: ${{coalesce(replace(format('{0}', parameters.enableThreadSanitizer), 'True', 'ON'), 'OFF')}}

  steps:
  - script: |
      sudo apt-get update
      sudo apt-get install libjavascriptcoregtk-4.1-dev libcurl4-openssl-dev ninja-build clang
    displayName: 'Install packages'

  - script: |
      export CC=${{parameters.CC}}
      export CXX=${{parameters.CXX}}
      cmake -B Build/ubuntu -G Ninja -D CMAKE_BUILD_TYPE=RelWithDebInfo -D ENABLE_SANITIZERS=$(SANITIZER_FLAG) -D ENABLE_THREAD_SANITIZER=$(THREAD_SANITIZER_FLAG) -D CMAKE_C_COMPILER=${{parameters.CC}} -D CMAKE_CXX_COMPILER=${{parameters.CXX}}
    displayName: 'Configure CMake'

  - script: |
      cd Build/ubuntu
      ninja
    displayName: 'Build Solution'

  - script: ./UnitTests
    workingDirectory: 'Build/ubuntu/Tests/UnitTests'
    displayName: 'Run Tests'
    ${{if eq(parameters.enableThreadSanitizer, true)}}:
      env:
        TSAN_OPTIONS: suppressions=$(Build.SourcesDirectory)/.github/tsan_suppressions.txt
        # JSC's concurrent GC on Linux uses SIGUSR1 + sem_wait to suspend mutator
        # threads at safepoints. TSan's signal interception delays SIGUSR1 delivery
        # indefinitely, deadlocking the Collector Thread's sem_wait. Disabling the
        # concurrent collector removes the dedicated Collector Thread, so GC runs
        # on the mutator without cross-thread signals. macOS JSC uses Mach
        # thread_suspend() and is unaffected.
        JSC_useConcurrentGC: '0'
