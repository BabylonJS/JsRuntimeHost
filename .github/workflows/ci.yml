name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# NOTE: this file is temporarily narrowed to ONLY the Hermes jobs to
# iterate on Hermes CI failures faster.  The full matrix is restored
# in a follow-up commit before this PR merges.

jobs:
  Win32_x64_Hermes:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64
      js-engine: Hermes

  Android_Hermes:
    uses: ./.github/workflows/build-android.yml
    with:
      js-engine: Hermes

  macOS_Xcode264_Hermes:
    uses: ./.github/workflows/build-macos.yml
    with:
      xcode-version: '26.4'
      runs-on: macos-26
      js-engine: Hermes

  iOS_Xcode264_Hermes:
    uses: ./.github/workflows/build-ios.yml
    with:
      xcode-version: '26.4'
      runs-on: macos-26
      simulator: 'iPhone 17'
      js-engine: Hermes
