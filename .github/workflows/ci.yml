name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Win32
  Win32_x86_Chakra:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: win32
      js-engine: Chakra

  Win32_x64_Chakra:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64
      js-engine: Chakra

  Win32_x64_JSI:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64
      js-engine: JSI

  Win32_x64_V8:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64
      js-engine: V8

  Win32_x64_QuickJS:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64
      js-engine: QuickJS

  Win32_x64_Hermes:
    uses: ./.github/workflows/build-win32.yml
    with:
      platform: x64
      js-engine: Hermes

  # UWP
  UWP_x64_Chakra:
    uses: ./.github/workflows/build-uwp.yml
    with:
      platform: x64
      js-engine: Chakra

  UWP_x64_JSI:
    uses: ./.github/workflows/build-uwp.yml
    with:
      platform: x64
      js-engine: JSI

  UWP_arm64_JSI:
    uses: ./.github/workflows/build-uwp.yml
    with:
      platform: arm64
      js-engine: JSI

  UWP_x64_V8:
    uses: ./.github/workflows/build-uwp.yml
    with:
      platform: x64
      js-engine: V8

  # Android
  Android_JSC:
    uses: ./.github/workflows/build-android.yml
    with:
      js-engine: JavaScriptCore

  Android_V8:
    uses: ./.github/workflows/build-android.yml
    with:
      js-engine: V8

  Android_QuickJS:
    uses: ./.github/workflows/build-android.yml
    with:
      js-engine: QuickJS

  Android_Hermes:
    uses: ./.github/workflows/build-android.yml
    with:
      js-engine: Hermes

  # macOS (no Apple + Hermes until the upstream shutdown crash is fixed)

  macOS_Xcode264:
    uses: ./.github/workflows/build-macos.yml
    with:
      xcode-version: '26.4'
      runs-on: macos-26

  macOS_Xcode264_Sanitizers:
    uses: ./.github/workflows/build-macos.yml
    with:
      xcode-version: '26.4'
      runs-on: macos-26
      enable-sanitizers: true

  macOS_Xcode264_ThreadSanitizer:
    uses: ./.github/workflows/build-macos.yml
    with:
      xcode-version: '26.4'
      runs-on: macos-26
      enable-thread-sanitizer: true

  # ── iOS ───────────────────────────────────────────────────────
  iOS_Xcode264:
    uses: ./.github/workflows/build-ios.yml
    with:
      xcode-version: '26.4'
      runs-on: macos-26
      simulator: 'iPhone 17'

  # Linux
  Ubuntu_gcc:
    uses: ./.github/workflows/build-linux.yml

  Ubuntu_clang:
    uses: ./.github/workflows/build-linux.yml
    with:
      cc: clang
      cxx: clang++

  Ubuntu_QuickJS:
    uses: ./.github/workflows/build-linux.yml
    with:
      js-engine: QuickJS

  Ubuntu_Sanitizers_clang:
    uses: ./.github/workflows/build-linux.yml
    with:
      cc: clang
      cxx: clang++
      enable-sanitizers: true

  Ubuntu_ThreadSanitizer_clang:
    uses: ./.github/workflows/build-linux.yml
    with:
      cc: clang
      cxx: clang++
      enable-thread-sanitizer: true
